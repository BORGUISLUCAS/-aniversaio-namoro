<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o meu amor ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#ff4d6d,#ff758f,#ff8fab,#ffc2d1);background-size:400% 400%;animation:bg 10s ease infinite;overflow:hidden}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{text-align:center;z-index:2}
button{background:#fff;color:#ff4d6d;border:none;padding:18px 35px;font-size:22px;border-radius:50px;cursor:pointer;transition:.3s;box-shadow:0 10px 25px rgba(0,0,0,.2)}
button:hover{transform:scale(1.08)}
.card{display:none;margin-top:30px;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);padding:30px;border-radius:20px;color:white;max-width:700px;animation:fade 1s}
@keyframes fade{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.heart{position:absolute;bottom:-30px;font-size:24px;color:white;animation:float linear infinite}
@keyframes float{from{transform:translateY(0) rotate(0deg);opacity:1}to{transform:translateY(-120vh) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div class="container">
<button onclick="document.getElementById('m').style.display='block'">Clique aqui, meu amor ❤️</button>
<div class="card" id="m">
<h1>Feliz 2 meses ❤️</h1>
<p>Mesmo com toda a distância entre nós, você faz meus dias mais felizes.
Obrigado por caminhar comigo e por acreditar na nossa história.
Que esses 2 meses sejam apenas o começo de muitos momentos lindos.
Eu te amo! ❤️</p>
</div>
</div>
<script>
for(let i=0;i<60;i++){const h=document.createElement("div");h.className="heart";h.innerHTML="❤";h.style.left=Math.random()*100+"vw";h.style.fontSize=(15+Math.random()*30)+"px";h.style.animationDuration=(4+Math.random()*6)+"s";h.style.animationDelay=Math.random()*5+"s";document.body.appendChild(h);}
</script>
</body>
</html>
